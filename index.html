<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Storyteller Entertainment</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <!-- 16:9 Bildbereich (80% der Website/Viewport-Höhe) -->
    <section class="hero" aria-label="Hero Bild">
      <!-- Tausche src gegen dein Bild aus -->
      <img
        class="hero__img"
        src="Splashscreen.jpg"
        alt="Grid Factory Splashscreen"
        loading="eager"
      />
      <div class="hero__overlay" aria-hidden="true"></div>

      <!-- Optionaler kleiner Label/Badge im Bild -->
      <div class="hero__badge">Grid Factory - coming soon</div>
    </section>

    <!-- Textbereich -->
    <section class="content" aria-label="Inhalt">
      <h1 class="content__headline">Grid Factory - a game with some gameplay</h1>
      <p class="content__text">
        This could be a very good text about my game. Yippie!
      </p>
      <a class="content__link" href="gridfactory.apk" aria-label="Mehr erfahren">Download for Android →</a>
       
    </section>
  </main>
</body>
</html>
