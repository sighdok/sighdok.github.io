<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minimal Nature Layout</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <!-- 16:9 Bildbereich (80% der Website/Viewport-Höhe) -->
    <section class="hero" aria-label="Hero Bild">
      <!-- Tausche src gegen dein Bild aus -->
      <img
        class="hero__img"
        src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=2400&q=80"
        alt="Natur-Landschaft"
        loading="eager"
      />
      <div class="hero__overlay" aria-hidden="true"></div>

      <!-- Optionaler kleiner Label/Badge im Bild -->
      <div class="hero__badge">Nature • Minimal</div>
    </section>

    <!-- Textbereich -->
    <section class="content" aria-label="Inhalt">
      <h1 class="content__headline">Headline Platzhalter</h1>
      <p class="content__text">
        Kurzer Text Platzhalter. Hier kannst du in 1–3 Sätzen beschreiben, worum es geht –
        ruhig, klar und aufgeräumt.
      </p>
      <a class="content__link" href="#" aria-label="Mehr erfahren">Mehr erfahren →</a>
    </section>
  </main>
</body>
</html>
